<script>
        // Simple Interaction logic for adding/removing items
        const container = document.getElementById('ingredient-container');
        const addButton = document.getElementById('add-ingredient');
        const countDisplay = document.getElementById('item-count');

        let itemCount = 2;

        addButton.addEventListener('click', () => {
            itemCount++;
            countDisplay.innerText = itemCount;

            const newCard = document.createElement('div');
            newCard.className = "glass-panel p-md rounded-xl shadow-sm border border-outline-variant relative overflow-hidden group transition-all hover:border-secondary/30 animate-in fade-in slide-in-from-bottom-4 duration-300";
            newCard.innerHTML = `
                <div class="absolute left-0 top-0 w-1 h-full bg-primary-container"></div>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-md items-end">
                    <div class="md:col-span-5">
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-xs">식재료명</label>
                        <input type="text" placeholder="식재료명 입력" class="w-full bg-surface border-outline-variant rounded-lg py-sm px-md text-body-md">
                    </div>
                    <div class="md:col-span-3">
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-xs">수량</label>
                        <input type="number" placeholder="0" class="w-full bg-surface border-outline-variant rounded-lg py-sm px-md text-body-md">
                    </div>
                    <div class="md:col-span-3">
                        <label class="font-label-md text-label-md text-on-surface-variant block mb-xs">단위</label>
                        <select class="w-full bg-surface border-outline-variant rounded-lg py-sm px-md text-body-md">
                            <option value="g">g</option>
                            <option value="kg">kg</option>
                            <option value="ml">ml</option>
                            <option value="l">l</option>
                            <option value="ea">ea</option>
                        </select>
                    </div>
                    <div class="md:col-span-1 flex justify-end">
                        <button class="material-symbols-outlined text-error p-2 hover:bg-error-container/20 rounded-full transition-colors delete-btn">delete</button>
                    </div>
                </div>
            `;
            container.appendChild(newCard);

            newCard.querySelector('.delete-btn').addEventListener('click', () => {
                newCard.remove();
                itemCount--;
                countDisplay.innerText = itemCount;
            });
        });

        // Initialize existing delete buttons
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.target.closest('.glass-panel').remove();
                itemCount--;
                countDisplay.innerText = itemCount;
            });
        });
    </script>
