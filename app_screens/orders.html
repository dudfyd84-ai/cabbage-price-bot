<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CartTiming - 주문 관리 내역</title>

                    "background": "#f8f9ff",
                    "outline-variant": "#bfc9c3",
                    "on-secondary-fixed": "#001453",

                    "on-tertiary": "#ffffff",
                    "inverse-surface": "#213145",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#003527",
                    "on-surface": "#0b1c30",
                    "tertiary-fixed": "#89f5e7",
                    "surface-container": "#e5eeff",
                    "secondary-fixed": "#dde1ff",
                    "on-primary-fixed-variant": "#0b513d",
                    "error": "#ba1a1a",
                    "primary-fixed": "#b0f0d6",
                    "surface-dim": "#cbdbf5",
                    "tertiary-container": "#004d46",
                    "surface-container-low": "#eff4ff",
                    "primary-fixed-dim": "#95d3ba",
                    "primary-container": "#064e3b",
                    "on-secondary-container": "#00217a",
                    "surface-container-high": "#dce9ff",
                    "surface-bright": "#f8f9ff",
                    "on-error-container": "#93000a",

                    "on-background": "#0b1c30",
                    "secondary-fixed-dim": "#b8c4ff",
                    "inverse-on-surface": "#eaf1ff",
                    "on-secondary-fixed-variant": "#173bab",
                    "surface": "#f8f9ff",

<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-container-high/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex justify-between items-center px-container-margin w-full max-w-7xl mx-auto h-16">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container-low transition-colors duration-200 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Order History</h1>
</div>
<button class="p-2 hover:bg-surface-container-low transition-colors duration-200 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">filter_list</span>
</button>
</div>
</header>
<main class="mt-20 px-container-margin space-y-6">
<!-- Filtering Section -->
<section class="space-y-4">
<div class="flex items-center gap-3">
<div class="flex-grow flex items-center justify-between glass-panel px-4 py-3.5 rounded-xl min-h-[48px]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">calendar_today</span>
<span class="font-label-md text-label-md text-on-surface" id="date-range-text">2026.07.01 ~ 2026.07.31</span>
</div>
<span class="material-symbols-outlined text-outline">expand_more</span>
</div>
<button class="bg-secondary-container text-on-secondary-container px-5 py-3.5 rounded-xl flex items-center gap-2 font-label-md text-label-md shadow-sm active:scale-95 transition-transform min-h-[48px]">
<span class="material-symbols-outlined text-[18px]">tune</span>
                    필터
                </button>
</div>
<!-- 기간 퀵 프리셋 (Quick Presets) -->
<div class="flex gap-2 overflow-x-auto pb-1 hide-scrollbar" id="date-presets">
<button data-preset="today" class="flex-1 min-h-[44px] px-4 py-2.5 rounded-full text-label-sm font-label-sm bg-white border border-outline-variant text-on-surface-variant transition-all whitespace-nowrap">오늘</button>
<button data-preset="3days" class="flex-1 min-h-[44px] px-4 py-2.5 rounded-full text-label-sm font-label-sm bg-white border border-outline-variant text-on-surface-variant transition-all whitespace-nowrap">최근 3일</button>
<button data-preset="week" class="flex-1 min-h-[44px] px-4 py-2.5 rounded-full text-label-sm font-label-sm bg-white border border-outline-variant text-on-surface-variant transition-all whitespace-nowrap">이번 주</button>
<button data-preset="month" class="flex-1 min-h-[44px] px-4 py-2.5 rounded-full text-label-sm font-label-sm bg-white border border-outline-variant text-on-surface-variant transition-all whitespace-nowrap">이번 달</button>
</div>
<!-- Status Chips (Tabs) -->
<div class="flex overflow-x-auto gap-3 pb-2 hide-scrollbar" id="status-chips">
<!-- Total (Active) -->
<button id="chip-all" class="flex-shrink-0 px-4 py-2 rounded-full bg-primary text-white flex items-center gap-2 shadow-md">
<span class="font-label-md text-label-md">전체 내역: 0</span>
</button>
<!-- Pending -->
<button id="chip-pending" class="flex-shrink-0 px-4 py-2 rounded-full bg-white border border-outline-variant text-on-surface-variant flex items-center gap-2">
<span class="font-label-md text-label-md">대기 중: 0</span>
</button>
<!-- Shipping -->
<button id="chip-shipping" class="flex-shrink-0 px-4 py-2 rounded-full bg-white border border-outline-variant text-on-surface-variant flex items-center gap-2">
<span class="font-label-md text-label-md">배송 중: 0</span>
</button>
<!-- Completed -->
<button id="chip-completed" class="flex-shrink-0 px-4 py-2 rounded-full bg-white border border-outline-variant text-on-surface-variant flex items-center gap-2">
<span class="font-label-md text-label-md">완료됨: 0</span>
</button>
<!-- Cancelled -->
<button id="chip-cancelled" class="flex-shrink-0 px-4 py-2 rounded-full bg-white border border-outline-variant text-on-surface-variant flex items-center gap-2">
<span class="font-label-md text-label-md">취소됨: 0</span>
</button>
</div>
</section>
<!-- Order List Section -->
<section class="space-y-4">
<h2 class="font-label-md text-label-md text-outline uppercase tracking-wider">주문 내역 리스트</h2>
<div class="space-y-4" id="orders-list">
<!-- 동적으로 주문 카드가 렌더링됩니다. -->
</div>
</section>
<!-- Empty state padding -->
<div class="h-12"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface/90 dark:bg-surface-container/90 backdrop-blur-lg border-t border-outline-variant/30 dark:border-outline/30 shadow-lg dark:shadow-none pb-safe">
<div class="flex justify-around items-center px-4 py-2">
<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:text-primary dark:hover:text-primary-fixed transition-colors" href="#">
<span class="material-symbols-outlined mb-1">dashboard</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</a>
<!-- Orders (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-full px-4 py-1 scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-label-sm text-label-sm">Orders</span>
</a>
<!-- Inventory -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:text-primary dark:hover:text-primary-fixed transition-colors" href="#">
<span class="material-symbols-outlined mb-1">inventory_2</span>
<span class="font-label-sm text-label-sm">Inventory</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:text-primary dark:hover:text-primary-fixed transition-colors" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</div>
</nav>
<script>
        // Micro-interactions for chips
        const chips = document.querySelectorAll('.flex.overflow-x-auto button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary', 'text-white', 'shadow-md');
                    c.classList.add('bg-white', 'border', 'border-outline-variant', 'text-on-surface-variant');
                });
                chip.classList.add('bg-primary', 'text-white', 'shadow-md');
                chip.classList.remove('bg-white', 'border', 'border-outline-variant', 'text-on-surface-variant');
            });
        });

        // Toggle mobile menu simulation
        document.querySelector('header button:first-child').addEventListener('click', () => {
            console.log('Menu toggled');
        });
    </script>
    <script src="nav.js"></script>
    <script src="orders-live.js"></script>
</body></html>
