<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            z-index: 10;
        }
        .range-bg {
            position: absolute;
            height: 80%;
            width: 100%;
            top: 10%;
            z-index: -1;
        }
        .range-start-cap {
            border-top-left-radius: 9999px;
            border-bottom-left-radius: 9999px;
            width: 50%;
            right: 0;
        }
        .range-end-cap {
            border-top-right-radius: 9999px;
            border-bottom-right-radius: 9999px;
            width: 50%;
            left: 0;
        }
        .range-middle {
            width: 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

</button>

</button>
</div>
<!-- Days of Week -->

<div class="text-on-surface-variant font-label-md text-label-md py-xs">월</div>
<div class="text-on-surface-variant font-label-md text-label-md py-xs">화</div>
<div class="text-on-surface-variant font-label-md text-label-md py-xs">수</div>
<div class="text-on-surface-variant font-label-md text-label-md py-xs">목</div>
<div class="text-on-surface-variant font-label-md text-label-md py-xs">금</div>
<div class="text-secondary font-label-md text-label-md py-xs">토</div>
</div>
<!-- Monthly Grid -->
<div class="calendar-grid p-sm gap-y-xs">
<!-- Empty slots for previous month -->
<div class="day-cell"></div>
<div class="day-cell"></div>
<div class="day-cell"></div>
<!-- May 1 (Wed) -->

<span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute top-[40%] -right-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/5 blur-[120px]"></div>
</div>
<script>
        // Simple Interaction Feedback
        document.querySelectorAll('.day-cell').forEach(cell => {
            cell.addEventListener('click', function() {
                if(!this.textContent.trim()) return;
                
                // Visual feedback only for demo
                this.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                this.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 200);
            });
        });

        // Hover animations for Apply button
        const applyBtn = document.querySelector('button.bg-primary-container');
        applyBtn.addEventListener('mouseenter', () => {
            applyBtn.classList.add('brightness-110');
        });
        applyBtn.addEventListener('mouseleave', () => {
            applyBtn.classList.remove('brightness-110');
        });
    </script>
