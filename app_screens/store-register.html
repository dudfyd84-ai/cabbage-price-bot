<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #f8f9ff; /* background token */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #bfc9c3;
            border-radius: 4px;
        }
        .chip-active {
            background-color: #064e3b; /* primary-container */
            color: #80bea6; /* on-primary-container */
            border-color: #064e3b;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#005049",
                        "surface-dim": "#cbdbf5",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#d3e4fe",
                        "secondary-fixed": "#dde1ff",
                        "on-primary-fixed": "#002117",
                        "on-secondary-container": "#00217a",
                        "on-tertiary-container": "#53c2b5",
                        "secondary": "#3755c3",
                        "on-surface": "#0b1c30",
                        "surface-container-high": "#dce9ff",
                        "surface-container": "#e5eeff",
                        "primary-container": "#064e3b",
                        "on-primary-container": "#80bea6",
                        "on-secondary-fixed": "#001453",
                        "error": "#ba1a1a",
                        "surface-tint": "#2b6954",
                        "on-primary-fixed-variant": "#0b513d",
                        "tertiary-fixed-dim": "#6bd8cb",
                        "tertiary-container": "#004d46",
                        "outline": "#707974",
                        "background": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "on-secondary-fixed-variant": "#173bab",
                        "on-background": "#0b1c30",
                        "secondary-container": "#708cfd",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#00342f",
                        "secondary-fixed-dim": "#b8c4ff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#213145",
                        "inverse-primary": "#95d3ba",
                        "surface": "#f8f9ff",
                        "primary-fixed": "#b0f0d6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#00201d",
                        "surface-variant": "#d3e4fe",
                        "primary": "#003527",
                        "on-surface-variant": "#404944",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#89f5e7",
                        "inverse-on-surface": "#eaf1ff",
                        "primary-fixed-dim": "#95d3ba",
                        "outline-variant": "#bfc9c3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "2xl": "48px",
                        "gutter": "12px",
                        "container-margin": "16px",
                        "base": "4px",
                        "lg": "24px",
                        "xs": "4px",
                        "xl": "32px",
                        "sm": "8px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "data-mono": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "data-mono": ["16px", {"lineHeight": "24px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface dark:bg-surface-dim flex items-center justify-between px-md h-16 border-b border-outline-variant dark:border-outline">
<div class="flex items-center gap-sm">
<button class="p-base rounded-full hover:bg-surface-container-high transition-colors active:opacity-80 active:scale-95">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">CartTiming</span>
</div>
<div class="text-on-surface-variant dark:text-on-surface-variant font-label-md text-label-md">
            Step 2 of 3
        </div>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-24 pb-12 flex items-center justify-center px-container-margin">
<div class="w-full max-w-xl bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-lg md:p-xl transition-all duration-300">
<!-- Headline & Subheadline -->
<div class="mb-xl">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">매장 정보 등록</h1>
<p class="font-body-md text-body-md text-on-surface-variant">원가 예측을 위해 식당의 기본 정보를 입력해 주세요.</p>
</div>
<!-- Form -->
<form class="space-y-lg" onsubmit="return false;">
<!-- Restaurant Name -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1">식당 이름</label>
<input class="w-full px-md py-3 rounded-lg border border-outline-variant bg-white focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" placeholder="예: 맛있는 주방 강남점" type="text"/>
</div>
<!-- Address -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1">매장 주소</label>
<div class="relative">
<input class="w-full pl-md pr-12 py-3 rounded-lg border border-outline-variant bg-white focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" placeholder="도로명 또는 지번 주소를 입력하세요" type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-surface-container-high rounded-full transition-colors" title="주소 검색">
<span class="material-symbols-outlined text-secondary">search</span>
</button>
</div>
</div>
<!-- Cuisine Type (Chips) -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1">업태 선택</label>
<div class="flex flex-wrap gap-sm" id="cuisine-chips">
<button class="px-md py-2 rounded-full border border-outline-variant text-label-md font-label-md text-on-surface-variant hover:border-secondary hover:text-secondary transition-all" onclick="toggleChip(this)" type="button">한식</button>
<button class="px-md py-2 rounded-full border border-outline-variant text-label-md font-label-md text-on-surface-variant hover:border-secondary hover:text-secondary transition-all" onclick="toggleChip(this)" type="button">중식</button>
<button class="px-md py-2 rounded-full border border-outline-variant text-label-md font-label-md text-on-surface-variant hover:border-secondary hover:text-secondary transition-all" onclick="toggleChip(this)" type="button">일식</button>
<button class="px-md py-2 rounded-full border border-outline-variant text-label-md font-label-md text-on-surface-variant hover:border-secondary hover:text-secondary transition-all" onclick="toggleChip(this)" type="button">양식</button>
<button class="px-md py-2 rounded-full border border-outline-variant text-label-md font-label-md text-on-surface-variant hover:border-secondary hover:text-secondary transition-all" onclick="toggleChip(this)" type="button">카페</button>
<button class="px-md py-2 rounded-full border border-outline-variant text-label-md font-label-md text-on-surface-variant hover:border-secondary hover:text-secondary transition-all" onclick="toggleChip(this)" type="button">베이커리</button>
<button class="px-md py-2 rounded-full border border-outline-variant text-label-md font-label-md text-on-surface-variant hover:border-secondary hover:text-secondary transition-all" onclick="toggleChip(this)" type="button">기타</button>
</div>
</div>
<!-- Operating Hours -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1">영업 시간</label>
<div class="grid grid-cols-2 gap-md">
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-label-sm text-label-sm text-outline">Open</span>
<input class="w-full pl-16 pr-md py-3 rounded-lg border border-outline-variant bg-white focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all font-data-mono text-data-mono text-on-surface" type="time"/>
</div>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-label-sm text-label-sm text-outline">Close</span>
<input class="w-full pl-16 pr-md py-3 rounded-lg border border-outline-variant bg-white focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent transition-all font-data-mono text-data-mono text-on-surface" type="time"/>
</div>
</div>
</div>
<!-- CTA -->
<div class="pt-lg">
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-xl font-headline-md text-headline-md shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
<span>다음 단계로</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-lg px-container-margin flex flex-col md:flex-row justify-between items-center gap-md bg-surface-container-lowest dark:bg-inverse-surface border-t border-outline-variant dark:border-outline">
<div class="flex flex-col items-center md:items-start gap-xs">
<span class="font-label-md text-label-md font-bold text-primary">CartTiming</span>
<span class="font-label-sm text-label-sm text-secondary dark:text-secondary-fixed">© 2024 CartTiming. Data-driven procurement.</span>
</div>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-all duration-200" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-all duration-200" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-all duration-200" href="#">Help Center</a>
</div>
</footer>
<script>
        function toggleChip(button) {
            const isActive = button.classList.contains('chip-active');
            
            // For single selection within this demo context
            const allChips = button.parentElement.querySelectorAll('button');
            allChips.forEach(chip => {
                chip.classList.remove('chip-active', 'bg-primary-container', 'text-on-primary-container', 'border-primary-container');
                chip.classList.add('border-outline-variant', 'text-on-surface-variant');
            });

            if (!isActive) {
                button.classList.add('chip-active', 'bg-primary-container', 'text-on-primary-container', 'border-primary-container');
                button.classList.remove('border-outline-variant', 'text-on-surface-variant');
            }
        }

        // Add some micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
