<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CartTiming · 개발자 로그인</title>
<style>
  :root { --primary:#003527; --secondary:#3755c3; --error:#ba1a1a; --bg:#f8f9ff; --muted:#404944; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:var(--bg); font-family:'Noto Sans KR',system-ui,sans-serif; color:var(--primary); }
  .card { width:min(92vw,380px); background:#fff; border:1px solid #dce9ff; border-radius:20px;
          padding:32px 28px; box-shadow:0 10px 30px rgba(11,28,48,.08); }
  .logo { display:flex; align-items:center; gap:8px; font-weight:800; font-size:22px; margin-bottom:4px; }
  .logo .dot { width:26px; height:26px; border-radius:7px; background:var(--primary);
               display:flex; align-items:center; justify-content:center; color:#7CF0C4; font-size:16px; }
  .sub { color:var(--muted); font-size:14px; margin:0 0 24px; }
  label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin:14px 0 6px; }
  input { width:100%; padding:12px 14px; border:1px solid #bfc9c3; border-radius:10px; font-size:15px;
          background:#fff; transition:border .15s; }
  input:focus { outline:none; border-color:var(--secondary); box-shadow:0 0 0 3px rgba(55,85,195,.15); }
  button { width:100%; margin-top:22px; padding:13px; border:0; border-radius:12px; cursor:pointer;
           background:var(--primary); color:#fff; font-size:15px; font-weight:700; transition:filter .15s; }
  button:hover { filter:brightness(1.12); }
  button:disabled { opacity:.6; cursor:default; }
  .msg { margin-top:14px; font-size:13px; min-height:18px; text-align:center; }
  .msg.err { color:var(--error); }
  .foot { margin-top:20px; font-size:12px; color:#8a938d; text-align:center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="dot">▪</span>CartTiming</div>
  <p class="sub">개발자 전용 페이지입니다. 로그인 후 이용하세요.</p>
  <form id="f" autocomplete="off">
    <label for="u">아이디</label>
    <input id="u" type="text" autocomplete="username" required/>
    <label for="p">비밀번호</label>
    <input id="p" type="password" autocomplete="current-password" required/>
    <button id="b" type="submit">로그인</button>
    <div class="msg" id="m"></div>
  </form>
  <div class="foot">© CartTiming · 인가된 사용자만 접근</div>
</div>
<script>
  const f = document.getElementById('f'), m = document.getElementById('m'), b = document.getElementById('b');
  f.addEventListener('submit', async (e) => {
    e.preventDefault();
    m.className = 'msg'; m.textContent = '확인 중...'; b.disabled = true;
    try {
      const r = await fetch('/api/dev-login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: document.getElementById('u').value, password: document.getElementById('p').value })
      });
      if (r.ok) {
        localStorage.setItem('ct_dev', '1');   // 온보딩 건너뛰기용 표식
        m.textContent = '로그인 성공. 이동합니다...';
        location.replace('/app');
      } else if (r.status === 503) {
        m.className = 'msg err'; m.textContent = '게이트가 아직 설정되지 않았습니다.';
      } else {
        m.className = 'msg err'; m.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
      }
    } catch (_) {
      m.className = 'msg err'; m.textContent = '네트워크 오류. 다시 시도하세요.';
    }
    b.disabled = false;
  });
</script>
</body>
</html>
